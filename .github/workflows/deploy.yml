name: React CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      # ESLINT CHECK
      - name: Run Lint
        run: npm run lint

      # TESTING
      - name: Run Tests
        run: npm test

      # BUILD
      - name: Build Project
        run: npm run build